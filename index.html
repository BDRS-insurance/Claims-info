<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDRS-insurance | Quotations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-container { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
            .tab-content.active { display: block !important; }
        }
    </style>
</head>
<body class="text-slate-900 pb-10">

    <nav class="bg-blue-900 text-white sticky top-0 z-50 no-print shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="font-black text-xl tracking-tighter uppercase">BDRS-insurance</span>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition">PRINT PDF</button>
        </div>
        <div class="flex max-w-4xl mx-auto border-t border-blue-800">
            <button onclick="showTab('motor')" id="btn-motor" class="flex-1 py-4 text-sm font-bold border-b-4 border-blue-400 bg-blue-800 text-white">🚗 MOTORCAR</button>
            <button onclick="showTab('fire')" id="btn-fire" class="flex-1 py-4 text-sm font-bold border-b-4 border-transparent text-blue-300 hover:text-white">🏠 FIRE / PROPERTY</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-6 px-4 print-container">

        <div id="motor-tab" class="tab-content active bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="bg-slate-100 p-4 border-b text-center">
                <h2 class="font-black text-lg uppercase">Motorcar Insurance Quotation</h2>
                <p class="text-[10px] font-bold text-slate-500">IC TARIFF - PRIVATE CAR COMPREHENSIVE</p>
            </div>
            
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4 no-print">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Vehicle Model</label>
                        <input type="text" placeholder="e.g. 2026 Toyota Fortuner" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-600 font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Fair Market Value (₱)</label>
                        <input type="text" id="m-fmv-display" value="1,000,000" 
                            class="w-full border-2 border-blue-100 bg-blue-50 p-3 rounded-xl font-black text-2xl text-blue-900 outline-none" 
                            oninput="formatAndCalc(this)">
                    </div>
                    
                    <div class="bg-slate-50 p-4 rounded-xl border space-y-3">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-1">Coverages & Perils</p>
                        <div class="flex items-center gap-3 text-sm font-bold text-blue-700 bg-blue-50 p-2 rounded-lg">
                            <svg class="w-5 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            Own Damage & Theft (1.50%) - Included
                        </div>
                        <label class="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" id="m-aon" checked onchange="runCalc()" class="w-5 h-5 accent-blue-600"> Acts of Nature (0.50%)</label>
                        <label class="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" id="m-vtplbi" checked onchange="runCalc()" class="w-5 h-5 accent-blue-600"> VTPL - Bodily Injury (₱530)</label>
                        <label class="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" id="m-vtplpd" checked onchange="runCalc()" class="w-5 h-5 accent-blue-600"> VTPL - Property Damage (₱1,050)</label>
                        <label class="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" id="m-pa" checked onchange="runCalc()" class="w-5 h-5 accent-blue-600"> Personal Accident (₱500)</label>
                        <label class="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" id="m-ebi" onchange="runCalc()" class="w-5 h-5 accent-blue-600"> Excess Bodily Injury (₱250)</label>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 border-b pb-2">Computation Summary</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between font-bold" id="row-m-od"><span>Own Damage/Theft:</span><span id="res-m-od">₱0.00</span></div>
                        <div class="flex justify-between" id="row-m-aon"><span>Acts of Nature:</span><span id="res-m-aon">₱0.00</span></div>
                        <div class="flex justify-between text-slate-600" id="row-m-vtplbi"><span>VTPL - BI:</span><span id="res-m-vtplbi">₱0.00</span></div>
                        <div class="flex justify-between text-slate-600" id="row-m-vtplpd"><span>VTPL - PD:</span><span id="res-m-vtplpd">₱
